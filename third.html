<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Pop - Ultimate Edition</title>
    <style>
        /* --- CSS VARIABLES & THEMES --- */
        :root {
            --bg-color: #050505;
            --text-color: #fff;
            --ui-bg: rgba(255, 255, 255, 0.1);
            --modal-bg: rgba(0, 0, 0, 0.85);
            --highlight: #00ffff;
            --gold: #ffd700;
        }

        body.day-mode {
            --bg-color: #e0e0e0;
            --text-color: #222;
            --ui-bg: rgba(0, 0, 0, 0.05);
            --modal-bg: rgba(255, 255, 255, 0.95);
            --highlight: #0066cc;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            transition: background-color 0.5s, color 0.5s;
            user-select: none;
        }

        /* --- UI OVERLAY (HUD) --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stats-group {
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            background: var(--ui-bg);
            padding: 10px 15px;
            border-radius: 8px;
            min-width: 80px;
            text-align: center;
            backdrop-filter: blur(2px);
        }

        .stat-label { font-size: 10px; opacity: 0.8; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: bold; font-family: monospace; }
        
        #score-val { color: var(--highlight); }
        #high-score-val { color: var(--gold); }
        #time-val { color: #ffff00; }
        body.day-mode #time-val { color: #bxbx00; }

        /* --- BUTTONS --- */
        .controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        button {
            background: var(--ui-bg);
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: var(--highlight);
            color: var(--bg-color);
            border-color: var(--highlight);
            transform: scale(1.05);
        }

        .icon-btn { width: 40px; height: 40px; border-radius: 50%; padding: 0; font-size: 18px; }

        /* --- MODAL (Start / Pause / Game Over) --- */
        #main-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-bg);
            display: flex; /* Flex is toggled via JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }

        .hidden { display: none !important; }

        #modal-title {
            font-size: 50px;
            margin: 0;
            color: var(--highlight);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--highlight);
        }

        #modal-subtitle { font-size: 20px; margin-bottom: 30px; opacity: 0.8; margin-top: 10px; }

        .modal-btn {
            padding: 15px 50px;
            font-size: 22px;
            background-color: var(--highlight);
            color: var(--bg-color);
            border: none;
            margin: 10px;
            box-shadow: 0 0 15px var(--highlight);
        }

        .modal-btn:hover { background-color: #fff; transform: scale(1.1); }
        
        .modal-btn.secondary {
            background: transparent;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            box-shadow: none;
        }

        #new-highscore-badge {
            background-color: var(--gold);
            color: #000;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 10px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar">
            <div class="stats-group">
                <div class="stat-box">
                    <span class="stat-label">Score</span>
                    <span id="score-val" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">High Score</span>
                    <span id="high-score-val" class="stat-value">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Time</span>
                    <span id="time-val" class="stat-value">60</span>
                </div>
            </div>

            <div class="controls">
                <button onclick="toggleDayNight()">☀ Mode</button>
                <button onclick="randomizeTheme()">🎨 Color</button>
                <button class="icon-btn" onclick="pauseGame()">⏸</button>
                <button class="icon-btn" onclick="resetGame()">↻</button>
            </div>
        </div>
        
        <div style="text-align: center; font-size: 12px; opacity: 0.5;">
            Click bubbles to pop. Gold = +5s & +50pts.
        </div>
    </div>

    <div id="main-modal">
        <div id="new-highscore-badge" class="hidden">🏆 NEW HIGH SCORE!</div>
        <h1 id="modal-title">NEON POP</h1>
        <p id="modal-subtitle">Ready to relax?</p>
        
        <div id="modal-buttons">
            <button class="modal-btn" id="primary-btn" onclick="startGame()">START GAME</button>
            <button class="modal-btn secondary hidden" id="resume-btn" onclick="resumeGame()">RESUME</button>
        </div>
    </div>

    <script>
        // --- SETUP ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const elScore = document.getElementById('score-val');
        const elHighScore = document.getElementById('high-score-val');
        const elTime = document.getElementById('time-val');
        const elModal = document.getElementById('main-modal');
        const elModalTitle = document.getElementById('modal-title');
        const elModalSub = document.getElementById('modal-subtitle');
        const btnPrimary = document.getElementById('primary-btn');
        const btnResume = document.getElementById('resume-btn');
        const elBadge = document.getElementById('new-highscore-badge');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- GAME VARIABLES ---
        let circles = [];
        let particles = [];
        let score = 0;
        let highScore = localStorage.getItem('neonPopHighScore') || 0;
        let timeLeft = 60;
        let gameState = 'MENU'; // MENU, PLAYING, PAUSED, GAMEOVER
        let timerInterval;
        let spawnRate = 0.03;
        
        // Visuals
        let isDayMode = false;
        let bgHue = 0;
        let useRandomBg = false;

        // Initialize Display
        elHighScore.innerText = highScore;

        // --- CLASSES ---
        class Circle {
            constructor() {
                this.radius = Math.random() * 30 + 20;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = canvas.height + this.radius;
                
                // 5% chance for Gold
                this.isGold = Math.random() < 0.05;

                if(this.isGold) {
                    this.color = 'gold';
                    this.speed = Math.random() * 3 + 3;
                    this.radius = 25;
                } else {
                    this.speed = Math.random() * 2 + 1;
                    this.color = isDayMode 
                        ? `hsl(${Math.random() * 360}, 70%, 45%)` 
                        : `hsl(${Math.random() * 360}, 100%, 60%)`;
                }
                this.markedForDeletion = false;
            }

            update() {
                if(gameState !== 'PLAYING') return; // Stop moving if paused
                this.y -= this.speed;
                if(this.y < -this.radius) this.markedForDeletion = true;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                if(!isDayMode) {
                    ctx.shadowBlur = this.isGold ? 30 : 15;
                    ctx.shadowColor = this.color;
                }
                ctx.fill();
                if(this.isGold) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
                ctx.closePath();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.life = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // --- GAME FUNCTIONS ---

        function startGame() {
            score = 0;
            timeLeft = 60;
            circles = [];
            particles = [];
            gameState = 'PLAYING';
            
            // UI Reset
            elScore.innerText = "0";
            elTime.innerText = "60";
            elTime.style.color = '#ffff00';
            elModal.classList.add('hidden');
            elBadge.classList.add('hidden');
            
            startTimer();
        }

        function pauseGame() {
            if(gameState !== 'PLAYING') return;
            gameState = 'PAUSED';
            clearInterval(timerInterval);
            
            // Show Modal
            elModalTitle.innerText = "PAUSED";
            elModalSub.innerText = "Take a breath.";
            btnPrimary.innerText = "RESTART";
            btnResume.classList.remove('hidden'); // Show Resume button
            elModal.classList.remove('hidden');
        }

        function resumeGame() {
            gameState = 'PLAYING';
            elModal.classList.add('hidden');
            startTimer();
        }

        function resetGame() {
            // "Panic" button functionality
            gameState = 'MENU';
            clearInterval(timerInterval);
            circles = [];
            
            elModalTitle.innerText = "NEON POP";
            elModalSub.innerText = "Ready to relax?";
            btnPrimary.innerText = "START GAME";
            btnResume.classList.add('hidden');
            elModal.classList.remove('hidden');
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            clearInterval(timerInterval);

            // Check High Score
            let isNewRecord = false;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('neonPopHighScore', highScore);
                isNewRecord = true;
                elBadge.classList.remove('hidden');
            }
            elHighScore.innerText = highScore;

            // Show UI
            elModalTitle.innerText = "TIME'S UP";
            elModalSub.innerText = `Final Score: ${score}`;
            btnPrimary.innerText = "PLAY AGAIN";
            btnResume.classList.add('hidden');
            elModal.classList.remove('hidden');
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(gameState !== 'PLAYING') return;
                
                timeLeft--;
                elTime.innerText = timeLeft;
                
                if(timeLeft <= 10) elTime.style.color = 'red';
                if(timeLeft <= 0) gameOver();
            }, 1000);
        }

        function spawn() {
            if(gameState !== 'PLAYING') return;
            // Spawn logic
            if(Math.random() < spawnRate + (score * 0.0002)) {
                circles.push(new Circle());
            }
        }

        function animate() {
            // Draw Background
            if(useRandomBg) {
                ctx.fillStyle = `hsla(${bgHue}, 50%, ${isDayMode?'90%':'10%'}, 0.3)`;
            } else {
                ctx.fillStyle = isDayMode ? 'rgba(240, 240, 240, 0.3)' : 'rgba(5, 5, 5, 0.3)';
            }
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Entities
            spawn();

            circles.forEach((c, i) => {
                c.update();
                c.draw();
                if(c.markedForDeletion) circles.splice(i, 1);
            });

            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if(p.life <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        // --- CONTROLS ---

        window.addEventListener('mousedown', (e) => {
            if(gameState !== 'PLAYING') return;
            const mx = e.clientX;
            const my = e.clientY;

            circles.forEach((c, i) => {
                const dist = Math.hypot(mx - c.x, my - c.y);
                if(dist < c.radius + 5) {
                    // HIT!
                    if(c.isGold) {
                        score += 50;
                        timeLeft += 5;
                        elTime.innerText = timeLeft;
                        for(let k=0; k<30; k++) particles.push(new Particle(c.x, c.y, 'gold'));
                    } else {
                        score += 10;
                        for(let k=0; k<10; k++) particles.push(new Particle(c.x, c.y, c.color));
                    }
                    circles.splice(i, 1);
                    elScore.innerText = score;
                }
            });
        });

        // Toggle Functions
        function toggleDayNight() {
            isDayMode = !isDayMode;
            document.body.classList.toggle('day-mode');
            useRandomBg = false;
        }

        function randomizeTheme() {
            useRandomBg = true;
            bgHue = Math.floor(Math.random() * 360);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Start Animation Loop
        animate();

    </script>
</body>
</html>
